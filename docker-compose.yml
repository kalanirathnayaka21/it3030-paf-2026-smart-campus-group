services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-campus-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=postgresql://postgres:wWUS0O4QgAiG9O5v@db.wlgqnrxywovrrjkzpnmb.supabase.co:5432/postgres
      - SPRING_DATASOURCE_USERNAME=postgres
      # NOTE: Change 'your_password' to your actual database password
      - SPRING_DATASOURCE_PASSWORD=your_password
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-campus-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
